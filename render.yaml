services:
  - type: web
    name: pingpong-star-server
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: scores
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: SCORES_FILE
        value: /var/data/scores.json
